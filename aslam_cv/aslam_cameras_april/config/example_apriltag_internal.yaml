target_type: apriltag_internal
tagFamily: t36h11
tagId: 1
# When non-empty, tagIds takes precedence over tagId.
tagIds: [1, 2, 3, 4, 5]
tagSize: 0.15625
tagSpacing: 0.25
blackBorderBits: 2
minVisiblePoints: 12
canonical_pixels_per_module: 24
refinement_window_radius: 0
internal_subpix_window_scale: 0.5
internal_subpix_window_min: 4
internal_subpix_window_max: 16
max_subpix_displacement2: 0.0
internal_subpix_displacement_scale: 0.25
max_internal_subpix_displacement: 6.0
enable_debug_output: true
internal_projection_mode: sphere_border_lattice
# Optional alternatives:
# internal_projection_mode: sphere_lattice
# internal_projection_mode: sphere_ray_refine
sphere_lattice_use_initial_camera: true # 使用粗初始值
sphere_lattice_init_xi: -0.2
sphere_lattice_init_alpha: 0.6
sphere_lattice_init_fu_scale: 0.55
sphere_lattice_init_fv_scale: 0.55
sphere_lattice_init_cu_offset: 0.0
sphere_lattice_init_cv_offset: 0.0

# Outer-tag detector / fixed C-S outer corner pipeline.
outer_local_context_scale: 0.05
enable_outer_spherical_refinement: false
outer_spherical_use_initial_camera: true # 使用粗初始值
do_outer_subpix_refinement: true
# If outer subpix is enabled, subpix radius = outer_subpix_scale * (tagSpacing * local_scale)
outer_subpix_scale: 0.15
outer_refine_gate_scale: 0.025
outer_refine_gate_min: 6.0

# Either keep the inline Kalibr DS model below, or replace it with:
# intermediate_camera_yaml: /path/to/mono_fisheye_calib_3_25_right-camchain.yaml
camera_model: ds
distortion_model: none
distortion_coeffs: []
intrinsics: [-0.17867356705653623, 0.6180871263819165, 1193.6021797760475, 1192.9067980786774, 2287.1229862699843, 2191.8264201158163]
resolution: [4512, 4512]
